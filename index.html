<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Protect - איתור קנסות חכם</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Heebo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 35s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }
        @keyframes marquee-reverse {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
        .animate-marquee-reverse {
            animation: marquee-reverse 40s linear infinite;
        }
        .animate-marquee-reverse:hover {
            animation-play-state: paused;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 5s ease-in-out infinite;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Blur text utility for document */
        .text-blur {
            color: transparent;
            text-shadow: 0 0 8px rgba(15, 23, 42, 0.8);
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 selection:bg-blue-500 selection:text-white overflow-x-hidden text-slate-900">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const Icon = ({ path, className = "w-6 h-6", strokeWidth = "2", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{path}</svg>
        );

        const AlertTriangle = (props) => <Icon {...props} path={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>} />;
        const CheckCircle = (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></>} />;
        const Upload = (props) => <Icon {...props} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>} />;
        const PenTool = (props) => <Icon {...props} path={<><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></>} />;
        const Search = (props) => <Icon {...props} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />;
        const Mail = (props) => <Icon {...props} path={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>} />;
        const ShieldCheck = (props) => <Icon {...props} path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></>} />;
        const FileText = (props) => <Icon {...props} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></>} />;
        const ChevronLeft = (props) => <Icon {...props} path={<><path d="m15 18-6-6 6-6"/></>} />;
        const X = (props) => <Icon {...props} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
        const FileCheck = (props) => <Icon {...props} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></>} />;
        const TrendingUp = (props) => <Icon {...props} path={<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>} />;
        const Scale = (props) => <Icon {...props} path={<><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></>} />;
        const Siren = (props) => <Icon {...props} path={<><path d="M7 12a5 5 0 0 1 5-5v0a5 5 0 0 1 5 5v6H7v-6Z"/><path d="M5 20a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2H5v-2Z"/><path d="M21 12h1"/><path d="M18.5 7.5 19 7"/><path d="M2 12h1"/><path d="M5.5 7.5 5 7"/><path d="M12 2v1"/></>} />;
        const LogOut = (props) => <Icon {...props} path={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>} />;
        const Bell = (props) => <Icon {...props} path={<><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>} />;
        const CreditCard = (props) => <Icon {...props} path={<><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></>} />;
        const MapPin = (props) => <Icon {...props} path={<><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>} />;
        const Calendar = (props) => <Icon {...props} path={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>} />;
        const Clock = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
        const ArrowRight = (props) => <Icon {...props} path={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />;
        const RefreshCw = (props) => <Icon {...props} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />;
        const Landmark = (props) => <Icon {...props} path={<><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/></>} />;
        const Receipt = (props) => <Icon {...props} path={<><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></>} />;
        const Lock = (props) => <Icon {...props} path={<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
        const Camera = (props) => <Icon {...props} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
        const Activity = (props) => <Icon {...props} path={<><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></>} />;
        const MessageCircle = (props) => <Icon {...props} path={<><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></>} />;
        const ExternalLink = (props) => <Icon {...props} path={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></>} />;
        const UserIcon = (props) => <Icon {...props} path={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />;
        const ChevronDown = (props) => <Icon {...props} path={<><path d="m6 9 6 6 6-6"/></>} />;
        const Unlock = (props) => <Icon {...props} path={<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>} />;
        const Smartphone = (props) => <Icon {...props} path={<><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></>} />;
        const Banknote = (props) => <Icon {...props} path={<><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></>} />;

        // --- Components ---

        const Button = ({ children, onClick, variant = 'primary', className = '', ...props }) => {
          const baseStyle = "font-bold rounded-full transition-all duration-300 flex items-center justify-center transform hover:-translate-y-1 active:scale-95";
          const variants = {
            primary: "bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-[0_8px_20px_-6px_rgba(29,78,216,0.5)] hover:shadow-[0_12px_25px_-6px_rgba(29,78,216,0.6)] py-3.5 px-8",
            secondary: "bg-slate-100 text-slate-800 hover:bg-slate-200 py-3.5 px-8 shadow-sm hover:shadow-md",
            outline: "border-2 border-blue-700 text-blue-700 hover:bg-blue-50 py-2.5 px-6",
            danger: "bg-gradient-to-r from-red-500 to-red-600 text-white shadow-[0_8px_20px_-6px_rgba(239,68,68,0.5)] hover:shadow-[0_12px_25px_-6px_rgba(239,68,68,0.6)] py-3 px-6",
            success: "bg-gradient-to-r from-green-500 to-green-600 text-white shadow-md hover:shadow-lg py-3 px-6",
            cta: "bg-gradient-to-r from-yellow-400 to-yellow-500 text-slate-900 shadow-[0_8px_20px_-6px_rgba(250,204,21,0.5)] hover:shadow-[0_12px_25px_-6px_rgba(250,204,21,0.6)] py-4 px-8 text-lg md:py-3.5",
            whatsapp: "bg-[#25D366] text-white shadow-[0_8px_20px_-6px_rgba(37,211,102,0.4)] hover:shadow-[0_12px_25px_-6px_rgba(37,211,102,0.5)] py-3 md:py-2.5 px-6 hover:bg-[#20bd5a]",
            applepay: "bg-black text-white hover:bg-slate-800 shadow-md py-3.5 px-8",
            gpay: "bg-white border border-slate-200 text-slate-800 hover:bg-slate-50 shadow-md py-3.5 px-8",
            bit: "bg-[#00b0b9] text-white hover:bg-[#009da5] shadow-md py-3.5 px-8",
          };
          
          return (
            <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} {...props}>
              {children}
            </button>
          );
        };

        const GridPattern = ({ className }) => (
          <svg className={`absolute inset-0 w-full h-full opacity-[0.03] pointer-events-none ${className}`} xmlns="http://www.w3.org/2000/svg">
            <defs>
              <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" strokeWidth="1.5"/>
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid-pattern)"/>
          </svg>
        );

        const RoadProtectLogo = ({ className = "" }) => (
          <div className={`flex flex-col items-start shrink-0 ${className}`} dir="ltr">
            <div className="flex items-center hover:scale-105 transition-transform duration-300 cursor-pointer">
              <img src="rsz_1chatgpt_image_apr_14_2025_01_30_24_pm.png" alt="Road Protect" className="h-8 md:h-12 object-contain" />
            </div>
          </div>
        );

        // --- Reusable Navigation Header ---
        const TopNav = ({ onNavigate, onOpenModal }) => (
            <div className="sticky top-0 z-40 w-full flex flex-col shadow-sm">
                <header className="bg-white/95 backdrop-blur-md w-full border-b border-slate-100">
                  <div className="container mx-auto px-4 py-2 flex justify-between items-center max-w-7xl">
                    <RoadProtectLogo />
                    
                    {/* Desktop Navigation */}
                    <div className="hidden md:flex items-center gap-4 lg:gap-6 text-sm font-medium text-slate-600">
                      <button onClick={() => onNavigate('conversion')} className="text-slate-600 font-bold hover:text-blue-700 transition-colors px-2 py-2 text-base">
                        דף נחיתה להמרות
                      </button>
                      <button onClick={() => onNavigate('packages')} className="text-slate-600 font-bold hover:text-blue-700 transition-colors px-2 py-2 text-base">
                        חבילות הגנה
                      </button>
                      <span className="flex items-center gap-1.5 font-bold bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full border border-blue-100">
                        <ShieldCheck className="w-4 h-4" />
                      </span>
                      {onOpenModal ? (
                         <Button variant="outline" onClick={onOpenModal} className="!py-2 !px-6 bg-white hover:bg-blue-50">
                            אזור אישי / התחברות
                         </Button>
                      ) : (
                         <Button variant="outline" onClick={() => onNavigate('dashboard')} className="!py-2 !px-6 bg-white hover:bg-blue-50">
                            חזור לדאשבורד
                         </Button>
                      )}
                    </div>

                    {/* Mobile Navigation */}
                    <div className="flex md:hidden items-center gap-2">
                      <button onClick={() => onNavigate('conversion')} className="flex items-center justify-center p-2 text-slate-600 hover:text-blue-700 bg-slate-100 rounded-full transition-colors" title="נחיתה המרות">
                        <Activity className="w-4 h-4" />
                      </button>
                      <button onClick={() => onNavigate('packages')} className="flex items-center justify-center p-2 text-slate-600 hover:text-blue-700 bg-slate-100 rounded-full transition-colors" title="חבילות">
                        <ShieldCheck className="w-4 h-4" />
                      </button>
                      {onOpenModal ? (
                          <button onClick={onOpenModal} className="flex items-center justify-center gap-1.5 px-3 py-1.5 text-xs font-bold text-white bg-blue-600 rounded-full shadow-md active:scale-95 transition-transform">
                            <UserIcon className="w-3.5 h-3.5" /> כניסה
                          </button>
                      ) : (
                          <button onClick={() => onNavigate('dashboard')} className="flex items-center justify-center gap-1.5 px-3 py-1.5 text-xs font-bold text-white bg-blue-600 rounded-full shadow-md active:scale-95 transition-transform">
                            <ChevronLeft className="w-3.5 h-3.5 rotate-180" /> חזור
                          </button>
                      )}
                    </div>
                  </div>
                </header>
            </div>
        );


        // ==========================================
        // 1. CONVERSION LANDING PAGE (PRD IMPLEMENTATION)
        // ==========================================
        const ConversionLandingPage = ({ onNavigate }) => {
            const [ticketQty, setTicketQty] = useState(1);
            const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
            const [selectedPlan, setSelectedPlan] = useState(null); // 'vip' or 'basic'
            const [isProcessing, setIsProcessing] = useState(false);
            const [paymentSuccess, setPaymentSuccess] = useState(false);

            // מנגנון העלמת הכפתור הצף כשאזור התשלום נראה במסך
            const [isStickyVisible, setIsStickyVisible] = useState(true);
            const checkoutRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        // אם לפחות 5% מאזור התשלום נראה במסך, נעלים את הכפתור הצף
                        setIsStickyVisible(!entry.isIntersecting);
                    },
                    { threshold: 0.05 }
                );

                if (checkoutRef.current) {
                    observer.observe(checkoutRef.current);
                }

                return () => {
                    if (checkoutRef.current) observer.unobserve(checkoutRef.current);
                };
            }, []);

            // 2. Dynamic Variables (Mock backend data)
            const mockData = {
                days_left: 4,
                customer_name: "ניר",
                offense_type: "עבירת חריגה במהירות",
                authority_name: "עיריית תל אביב-יפו",
                ticket_number: "8374662",
                current_fine_amount: 1000,
                points_penalty: 8,
                late_fee_amount: 1350
            };

            // 4. Basic Pricing Logic (Packages: 1, 3, 5)
            const appealPrices = { 1: 49, 3: 129, 5: 199 };
            const calculateBasicPrice = (qty) => appealPrices[qty] || 49;

            const handlePlanSelection = (plan) => {
                setSelectedPlan(plan);
                setIsPaymentModalOpen(true);
            };

            const handleProcessPayment = () => {
                setIsProcessing(true);
                // Simulate API call processing
                setTimeout(() => {
                    setIsProcessing(false);
                    setPaymentSuccess(true);
                    // Redirect after success
                    setTimeout(() => {
                        setIsPaymentModalOpen(false);
                        setPaymentSuccess(false);
                        onNavigate('dashboard');
                    }, 2000);
                }, 2500);
            };

            const scrollToCheckout = () => {
                document.getElementById('checkout-section').scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="w-full min-h-screen bg-slate-50 flex flex-col font-heebo pb-24 md:pb-0">
                    
                    {/* Area A: Urgency Bar */}
                    <div className="w-full bg-red-600 text-white py-2 px-2 md:px-4 relative overflow-hidden">
                        <div className="absolute inset-0 bg-red-500 opacity-50 animate-pulse-slow"></div>
                        {/* Progress bar visual logic: If 4 days left out of 30, width is small */}
                        <div className="absolute bottom-0 left-0 h-1 bg-white/40" style={{ width: `${(mockData.days_left / 30) * 100}%` }}></div>
                        <div className="container mx-auto max-w-5xl flex items-center justify-center gap-1.5 md:gap-2 relative z-10 text-[11px] sm:text-sm md:text-base font-bold text-center">
                            <Clock className="w-3.5 h-3.5 md:w-5 md:h-5 animate-pulse shrink-0" />
                            <span>נותרו <span className="text-yellow-300 font-black text-sm md:text-lg mx-0.5 md:mx-1">{mockData.days_left}</span> ימים בלבד! לתוספת פיגור אוטומטית כקבוע בחוק.</span>
                        </div>
                    </div>

                    <TopNav onNavigate={onNavigate} />

                    <main className="container mx-auto px-4 py-6 md:py-12 max-w-5xl w-full flex-1">
                        
                        {/* Area B: Hero & Dashboard */}
                        <section className="mb-10 md:mb-12">
                            <div className="text-center mb-8 md:mb-10">
                                <h1 className="text-[2rem] leading-[1.1] md:text-5xl font-black text-slate-900 mb-3 md:mb-4 tracking-tight drop-shadow-sm px-2">
                                    {mockData.customer_name}, כתב הערעור המקצועי שלך מוכן להגשה.
                                </h1>
                                <div className="flex flex-wrap items-center justify-center gap-1.5 md:gap-3 text-xs md:text-base font-medium text-slate-600">
                                    <span className="bg-slate-200 px-2.5 py-1 md:px-3 rounded-md">{mockData.offense_type}</span>
                                    <span className="text-slate-300 hidden sm:inline">•</span>
                                    <span className="bg-blue-100 text-blue-800 px-2.5 py-1 md:px-3 rounded-md">{mockData.authority_name}</span>
                                    <span className="text-slate-300 hidden sm:inline">•</span>
                                    <span className="bg-slate-100 border border-slate-200 px-2.5 py-1 md:px-3 rounded-md font-mono">דוח מס' {mockData.ticket_number}</span>
                                </div>
                            </div>

                            {/* Mini Dashboard Metrics */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 max-w-4xl mx-auto">
                                <div className="bg-white rounded-[1.5rem] md:rounded-2xl p-5 md:p-6 border border-slate-200 shadow-sm text-center relative overflow-hidden">
                                    <div className="absolute -right-4 -top-4 opacity-5 text-slate-900"><Banknote className="w-20 h-20 md:w-24 md:h-24"/></div>
                                    <h4 className="text-slate-500 font-bold text-xs md:text-sm mb-1.5 md:mb-2 relative z-10">גובה קנס נוכחי</h4>
                                    <div className="text-3xl md:text-4xl font-black text-slate-800 relative z-10">₪{mockData.current_fine_amount}</div>
                                </div>
                                <div className="bg-red-50 rounded-[1.5rem] md:rounded-2xl p-5 md:p-6 border border-red-200 shadow-sm text-center relative overflow-hidden">
                                     <div className="absolute -right-4 -top-4 opacity-5 text-red-900"><TrendingUp className="w-20 h-20 md:w-24 md:h-24"/></div>
                                    <h4 className="text-red-600 font-bold text-xs md:text-sm mb-1.5 md:mb-2 relative z-10">קנס לאחר תוספת פיגורים</h4>
                                    <div className="text-3xl md:text-4xl font-black text-red-700 relative z-10 line-through decoration-red-400 decoration-4">₪{mockData.late_fee_amount}</div>
                                </div>
                            </div>
                        </section>

                        {/* Area C: Document Preview (Endowment Effect) */}
                        <section className="mb-12 md:mb-16 relative">
